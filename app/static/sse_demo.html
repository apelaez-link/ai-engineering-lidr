<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Estimador — demo de streaming SSE</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.4rem; }
    textarea { width: 100%; min-height: 110px; padding: .6rem; font: inherit; box-sizing: border-box; }
    button { padding: .6rem 1.2rem; font: inherit; cursor: pointer; margin-top: .5rem; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #out { white-space: pre-wrap; border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin-top: 1rem; min-height: 3rem; }
    #meta { font-size: .85rem; opacity: .8; margin-top: .5rem; }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .err { color: #c0392b; }
  </style>
</head>
<body>
  <h1>🧮 Estimador — streaming por SSE</h1>
  <p>Cliente HTML mínimo (sin Streamlit) que consume el endpoint
     <code>POST /api/v1/estimate/stream</code> y pinta la respuesta token a token.</p>

  <textarea id="input" placeholder="Pega aquí la transcripción de la reunión…"></textarea>
  <br />
  <button id="send">Generar estimación ▶</button>

  <div id="out"></div>
  <div id="meta"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const sendBtn = $("send"), out = $("out"), meta = $("meta"), input = $("input");

    sendBtn.addEventListener("click", async () => {
      const transcription = input.value.trim();
      if (!transcription) return;
      sendBtn.disabled = true;
      out.textContent = "";
      meta.textContent = "";
      let full = "";

      try {
        const resp = await fetch("/api/v1/estimate/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
          body: JSON.stringify({ transcription }),
        });
        if (!resp.ok) throw new Error("HTTP " + resp.status);

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        // Bucle de lectura: acumulamos en un buffer y procesamos eventos SSE
        // completos (separados por línea en blanco "\n\n").
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let sep;
          while ((sep = buffer.indexOf("\n\n")) !== -1) {
            const rawEvent = buffer.slice(0, sep);
            buffer = buffer.slice(sep + 2);
            handleEvent(rawEvent);
          }
        }
      } catch (err) {
        out.innerHTML += `<span class="err">\n\n[error de conexión] ${err.message}</span>`;
      } finally {
        sendBtn.disabled = false;
      }

      function handleEvent(rawEvent) {
        let eventType = "token", data = "";
        for (const line of rawEvent.split("\n")) {
          if (line.startsWith("event:")) eventType = line.slice(6).trim();
          else if (line.startsWith("data:")) data += line.slice(5).trimStart();
        }
        if (!data) return;
        let parsed;
        try { parsed = JSON.parse(data); } catch { return; }

        if (eventType === "token") {
          full += parsed.text || "";
          out.innerHTML = escapeHtml(full) + '<span class="cursor">▍</span>';
        } else if (eventType === "done") {
          out.textContent = full;  // quita el cursor
          meta.textContent =
            `modelo: ${parsed.model} · proveedor: ${parsed.provider} · ` +
            `tokens: ${parsed.tokens_in}/${parsed.tokens_out} · ` +
            `coste: $${(parsed.cost_usd ?? 0).toFixed(6)} · ` +
            `caché: ${parsed.cache_hit} · fallback: ${parsed.fallback_used} · ` +
            `finish_reason: ${parsed.finish_reason}`;
          if (parsed.finish_reason === "length") {
            meta.innerHTML += ' <span class="err">⚠️ respuesta truncada</span>';
          }
        } else if (eventType === "error") {
          out.innerHTML += `<span class="err">\n\n[error] ${parsed.detail || data}</span>`;
        }
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }
    });
  </script>
</body>
</html>
